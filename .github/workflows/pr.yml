name: PR

on:
  pull_request: { }

jobs:
  lint:
    name: Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack prepare pnpm@10.33.0 --activate

      - name: Run go generate
        run: go generate ./...

      - name: Golangci Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
          args: --build-tags=goolm,stdjson

      - name: Feature requirements lint
        run: make lint-features

      - name: Frontend lint
        run: make lint-frontend

      - name: Fetch base ref
        run: git fetch origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"

      - name: Feature requirements delta guard
        run: make feature-delta BASE_REF=origin/${{ github.base_ref }} HEAD_REF=HEAD

  vuln_check:
    name: Security Check
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -tags=goolm,stdjson
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run Govulncheck
        run: govulncheck -C . -format text ./...

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run go generate
        run: go generate ./...

      - name: Run go test
        run: go test -tags goolm,stdjson ./...

      - name: Fetch base ref
        run: git fetch origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"

      - name: Coverage delta guard
        run: make coverage-delta BASE_REF=origin/${{ github.base_ref }} HEAD_REF=HEAD

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run Docker-backed integration suites
        run: bash ./scripts/run-integration-tests.sh
